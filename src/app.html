<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTrain Studio | Professional Model Trainer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --border: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em; }
        .version { font-size: 0.75rem; color: var(--text-muted); background: var(--bg-input); padding: 2px 8px; border-radius: 4px; margin-left: 10px; }

        main {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .panel:last-child { border-right: none; border-left: 1px solid var(--border); }
        .center-panel { background: #162032; position: relative; }

        h2 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 1rem; font-weight: 600; }

        .control-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.5rem; color: var(--text-muted); }
        
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.875rem;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled { background: var(--bg-input); color: var(--text-muted); cursor: not-allowed; }
        button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        button.secondary:hover { background: var(--bg-input); }
        button.danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        button.danger:hover { background: var(--danger); color: white; }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(51, 65, 85, 0.3);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .mapper-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .mapper-label { font-size: 0.75rem; color: var(--text-muted); }

        .model-list { list-style: none; }
        .model-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .model-item.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .model-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .model-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .model-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
        .model-actions button { padding: 0.25rem 0.5rem; font-size: 0.7rem; width: auto; }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .stat-card { background: var(--bg-input); padding: 0.75rem; border-radius: 6px; text-align: center; }
        .stat-val { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
        .stat-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        #log-container {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .progress-container { width: 100%; background: var(--bg-input); height: 6px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <h1>WebTrain Studio</h1>
        <span class="version">v2.0 Pro</span>
    </div>
    <div>
        <button class="secondary" style="width: auto; padding: 0.5rem 1rem;" onclick="exportAllModels()">Export All Models</button>
    </div>
</header>

<main>
    <section class="panel">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('train')">Training</div>
            <div class="tab" onclick="switchTab('generate')">Generate</div>
        </div>

        <div id="tab-train" class="tab-content active">
            <div class="control-group">
                <label>Project Name</label>
                <input type="text" id="project-name" placeholder="e.g., MyCharacter_v1" value="Model_1">
            </div>

            <div class="control-group">
                <label>Dataset Source</label>
                <select id="dataset-type" onchange="toggleDatasetInput()">
                    <option value="upload">Direct Image Upload</option>
                    <option value="parquet">Parquet / CSV (Remote Links)</option>
                </select>
            </div>

            <div id="input-upload" class="control-group">
                <div class="drop-zone" id="drop-zone">
                    <p>Drag & Drop Images Here</p>
                    <p style="font-size: 0.75rem; margin-top: 5px;">or click to browse</p>
                    <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                </div>
                <div style="margin-top: 10px; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                    <span id="img-count">0</span> images loaded
                </div>
            </div>

            <div id="input-parquet" class="control-group" style="display: none;">
                <div class="drop-zone" id="data-drop-zone">
                    <p>Drop .parquet or .csv file</p>
                    <input type="file" id="data-file-input" accept=".parquet,.csv" style="display: none;">
                </div>
                
                <div id="column-mapper" style="margin-top: 1rem; display: none;">
                    <label style="font-size: 0.75rem;">Map Columns to Data</label>
                    <div class="mapper-row">
                        <select id="map-image"><option value="">Select Image Column</option></select>
                        <span class="mapper-label">Image URL / Path</span>
                    </div>
                    <div class="mapper-row">
                        <select id="map-text"><option value="">Select Text Column</option></select>
                        <span class="mapper-label">Caption / Prompt</span>
                    </div>
                    <button class="secondary" style="margin-top: 10px;" onclick="processDatasetFile()">Load Dataset</button>
                </div>
            </div>

            <div class="control-group">
                <label>Trigger Word</label>
                <input type="text" id="trigger-word" placeholder="e.g., ohwx man">
            </div>

            <div class="control-group">
                <label>Training Mode</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button type="button" id="mode-stabilized" class="secondary" onclick="selectTrainingMode('stabilized')" style="border-color: var(--accent); background: rgba(59, 130, 246, 0.1);">
                        <div style="font-weight: 600; font-size: 0.85rem;">Stabilized</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">Base model + Text Encoder<br>Best for 5-20 images</div>
                    </button>
                    <button type="button" id="mode-scratch" class="secondary" onclick="selectTrainingMode('scratch')">
                        <div style="font-weight: 600; font-size: 0.85rem;">From Scratch</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">Full UNet + Text Encoder<br>Best for 20+ images</div>
                    </button>
                </div>
                <input type="hidden" id="training-mode" value="stabilized">
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-val" id="steps-display">0</div>
                    <div class="stat-lbl">Steps</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="loss-display">0.00</div>
                    <div class="stat-lbl">Loss</div>
                </div>
            </div>

            <div class="control-group">
                <label>Learning Rate</label>
                <select id="learning-rate">
                    <option value="0.0001">0.0001 (Slow, Stable)</option>
                    <option value="0.0005" selected>0.0005 (Balanced)</option>
                    <option value="0.001">0.001 (Fast, Risk of Overfit)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Components to Train</label>
                <select id="train-components">
                    <option value="text-encoder">Text Encoder Only (Stabilized)</option>
                    <option value="unet">UNet Only</option>
                    <option value="both">Both UNet + Text Encoder (From Scratch)</option>
                </select>
            </div>

            <button id="btn-train" onclick="startTraining()">Start Training</button>
            <button id="btn-stop" class="danger" style="display: none; margin-top: 10px;" onclick="stopTraining()">Stop Training</button>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div id="tab-generate" class="tab-content">
            <div class="control-group">
                <label>Active Model</label>
                <select id="gen-model-select" onchange="updateGenModelInfo()">
                    <option value="">No Model Loaded</option>
                </select>
                <div id="gen-model-info" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;"></div>
            </div>

            <div class="control-group">
                <label>Prompt</label>
                <textarea id="gen-prompt" rows="3" placeholder="Describe what you want to generate..."></textarea>
            </div>

            <div class="stat-grid">
                <div class="control-group">
                    <label>Steps</label>
                    <input type="number" id="gen-steps" value="20" min="10" max="50">
                </div>
                <div class="control-group">
                    <label>Guidance</label>
                    <input type="number" id="gen-cfg" value="7.5" step="0.5">
                </div>
            </div>

            <button onclick="generateImage()">Generate Image</button>
        </div>
    </section>

    <section class="panel center-panel">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div id="placeholder-text" style="color: var(--text-muted);">
                Training visualization or generated image will appear here
            </div>
        </div>
        <div style="position: absolute; bottom: 20px; left: 20px; right: 20px;">
            <canvas id="loss-chart" height="100"></canvas>
        </div>
    </section>

    <section class="panel">
        <h2>Model Database</h2>
        <div style="margin-bottom: 1rem; display: flex; gap: 10px;">
            <button class="secondary" onclick="document.getElementById('import-model-input').click()">Import Model</button>
            <input type="file" id="import-model-input" style="display: none;" accept=".json" onchange="importModel(this)">
        </div>
        
        <ul class="model-list" id="model-list-container">
        </ul>

        <h2 style="margin-top: 2rem;">System Log</h2>
        <div id="log-container"></div>
    </section>
</main>

<script src="app.js"></script>
<script src="trainer.js"></script>
</body>
</html>
